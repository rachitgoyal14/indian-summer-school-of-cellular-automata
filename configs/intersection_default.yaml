grid:
  cell_length_m: 0.5
  cell_width_m: 0.7
  lane_width_m: 3.5
legs: 4
midblock_test:
  road_length_m: 1000
simulation:
  time_step_s: 1
  duration_s: 3600
  random_seed: 42

signal:
  cycle_length_s: 130
  green_s: 30
  red_s: 100

izoi_distance_m:
  two_wheeler: 100 # Placeholder (lower than MTW due to agility/reaction time)
  three_wheeler: 141.13 # from Table 1 mean for MTW
  car: 187.385 # from Table 1 mean for Car
  bus: 111.26 # from Table 1 mean for Bus
izoi_deceleration_rate: 2.0 # cells/step^2

turn_proportions:
  default: {left: 0.175, straight: 0.65, right: 0.175}

modes: [two_wheeler, three_wheeler, car, bus]
mode_params:
  two_wheeler:
    length_cells: 4
    width_cells: 1
    max_speed_cells_per_step: 30
    max_accel_cells_per_step2: 4
    p_slowdown: 0.05
    lane_change_prob: 0.8
    position_preference: 0.1 # tends toward edges
  three_wheeler:
    length_cells: 5
    width_cells: 2
    max_speed_cells_per_step: 29
    max_accel_cells_per_step2: 3
    p_slowdown: 0.05
    lane_change_prob: 0.7
    position_preference: 0.3
  car:
    length_cells: 7
    width_cells: 3
    max_speed_cells_per_step: 28
    max_accel_cells_per_step2: 3
    p_slowdown: 0.06
    lane_change_prob: 0.6
    position_preference: 0.5 # tends toward center
  bus:
    length_cells: 20
    width_cells: 4
    max_speed_cells_per_step: 20
    max_accel_cells_per_step2: 2
    p_slowdown: 0.10
    lane_change_prob: 0.3
    position_preference: 0.5

# --- Phase 5: Seepage ---
# Lateral safety margin: minimum lateral clearance (cells) beyond vehicle width required to seep.
# 0.5 cells = 0.35m — approximately half a cell-width, physically tight but feasible for two-wheelers.
# Chosen as a conservative default; adjustable for calibration.
lateral_safety_margin_cells: 0.5

# Longitudinal safety margin: minimum forward clearance (cells) required to seep diagonally.
# 1 cell = 0.5m — one cell-length of buffer in front, conservative default.
longitudinal_safety_margin_cells: 1

# Modes eligible to perform seepage (small vehicles only, per paper's Algorithm 3 description).
# Cars and buses explicitly excluded — seepage applies only to small-footprint vehicles.
seepage_eligible_modes: [two_wheeler, three_wheeler]

# Seepage advance rate (cells/step): how many cells a seeping vehicle advances per time-step.
# Slower than free-flow max speed — seepage is cautious gap-threading, not full-speed movement.
seepage_advance_cells_per_step:
  two_wheeler: 2
  three_wheeler: 1
